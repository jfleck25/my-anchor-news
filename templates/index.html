<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Anchor | Daily Briefing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Instrument Serif', 'Georgia', 'serif'],
                        body: ['Geist', 'Inter', 'sans-serif'],
                        mono: ['Geist Mono', 'monospace'],
                    },
                    colors: {
                        slate: {
                            50: '#F8FAFC',
                            900: '#0F172A',
                            950: '#020617', // For dark mode
                        },
                        amber: {
                            500: '#F59E0B',
                        },
                        emerald: {
                            500: '#10B981',
                        },
                        rose: {
                            500: '#F43F5E',
                        },
                        blue: {
                            500: '#3B82F6',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- PostHog Analytics (set POSTHOG_API_KEY in env to enable) -->
    <script>
        !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");2==o.length&&(t=t[o[0]],e=o[1]),t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}}(p=t.createElement("script")).type="text/javascript",p.async=!0,p.src=s.api_host+"/static/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(void 0!==a?u=e[a]=[]:a="posthog",u.people=u.people||[],u.toString=function(t){var e="posthog";return"posthog"!==a&&(e+="."+a),t||(e+=" (stub)"),e},u.people.toString=function(){return u.toString(1)+".people (stub)"},o="capture identify alias people.set people.set_once set_config register register_once unregister opt_out_capturing has_opted_out_capturing opt_in_capturing reset isFeatureEnabled onFeatureFlags getFeatureFlag getFeatureFlagPayload reloadFeatureFlags group updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures getActiveMatchingSurveys getSurveys onSessionId".split(" "),n=0;n<o.length;n++)g(u,o[n]);e._i.push([i,s,a])},e.__SV=1)}(document,window.posthog||[]);

    <!-- Sentry Error Tracking (DSN injected from SENTRY_DSN_FRONTEND) -->
    <script src="https://browser.sentry-cdn.com/7.99.0/bundle.min.js" crossorigin="anonymous"></script>
    <script>
        (function() {
            var sentryDsn = '{{ sentry_dsn_frontend }}';
            if (typeof Sentry !== 'undefined' && sentryDsn && sentryDsn.trim()) {
                Sentry.init({
                    dsn: sentryDsn,
                    integrations: [new Sentry.BrowserTracing()],
                    tracesSampleRate: 1.0,
                    environment: window.location.hostname === 'localhost' ? 'development' : 'production',
                    release: 'my-anchor@1.0.0'
                });
                console.log('✅ Sentry error tracking enabled');
            } else {
                if (typeof Sentry === 'undefined') console.error('❌ Sentry SDK failed to load');
                else console.log('Sentry disabled (no DSN configured)');
            }
        })();
    </script>
    <script>
        (function() {
            try {
                var stored = localStorage.getItem('myanchor-dark-mode');
                if (stored === 'true') document.documentElement.classList.add('dark');
                else if (stored === 'false') document.documentElement.classList.remove('dark');
                else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
            } catch (e) {}
        })();
    </script>
    <style>
        body { 
            font-family: 'Geist', 'Inter', sans-serif;
            background-color: #F8FAFC;
        }
        
        .dark body {
            background-color: #0F172A; /* slate-900 */
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        /* Audio Player Waveform Stub */
        .waveform {
            height: 40px;
            background: repeating-linear-gradient(90deg, #334155 0, #334155 2px, transparent 2px, transparent 8px);
        }
        
        .dark .waveform {
            background: repeating-linear-gradient(90deg, #475569 0, #475569 2px, transparent 2px, transparent 8px);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body class="text-slate-900 dark:text-slate-100 antialiased transition-colors duration-200">
    <div id="root"></div>

    <!-- React: production UMD when Flask debug is off (smaller, faster; dev build when debugging) -->
    {% if react_production %}
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    {% else %}
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    {% endif %}
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const MOCK_MODE = {{ 'true' if mock_mode else 'false' }};
    /* {% raw %} */
        // --- Configuration ---
        const backendUrl = "";
        const ph = (fn, ...args) => { try { if (window.posthog && typeof window.posthog[fn] === 'function') return window.posthog[fn](...args); } catch(e) {} };
        const escapeHtml = (unsafe) => {
            if (!unsafe) return '';
            return String(unsafe)
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        };
        const getSourceDomain = (source) => {
            if (!source) return null;
            const m = source.match(/@([\w.-]+\.[\w.-]+)/);
            if (m) return m[1];
            const s = source.split('<')[0].trim();
            if (/\.(com|co|org|net|io)(\s|$)/.test(s)) return s.replace(/\s.*/, '');
            return null;
        };

        // --- Icons ---
        const Icons = {
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            Moon: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
            Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
            Play: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            Pause: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>,
            Refresh: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21h5v-5"/></svg>,
            Share: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            Mic: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>,
            Star: ({ filled }) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        };

        // --- Component: Settings Modal ---
        const SettingsModal = ({ isOpen, onClose, currentSettings, onSave }) => {
            const [sources, setSources] = React.useState(currentSettings.sources || []);
            const [prioritySources, setPrioritySources] = React.useState(currentSettings.priority_sources || []);
            const [keywords, setKeywords] = React.useState(currentSettings.keywords || []);
            const [timeWindow, setTimeWindow] = React.useState(currentSettings.time_window_hours || 24);
            const [personality, setPersonality] = React.useState(currentSettings.personality || 'anchor');
            const [newSource, setNewSource] = React.useState("");
            const [newKeyword, setNewKeyword] = React.useState("");
            const [isSaving, setIsSaving] = React.useState(false);

            // --- Source Management ---
            const handleAddSource = () => {
                if (newSource && !sources.includes(newSource)) {
                    setSources([...sources, newSource]);
                    setNewSource("");
                }
            };
            const handleRemoveSource = (sourceToRemove) => {
                setSources(sources.filter(s => s !== sourceToRemove));
                setPrioritySources(prioritySources.filter(s => s !== sourceToRemove));
            };
            const togglePriority = (source) => {
                if (prioritySources.includes(source)) {
                    setPrioritySources(prioritySources.filter(s => s !== source));
                } else {
                    setPrioritySources([...prioritySources, source]);
                }
            };

            // --- Watchlist Management ---
            const handleAddKeyword = () => {
                if (newKeyword && !keywords.includes(newKeyword)) {
                    setKeywords([...keywords, newKeyword]);
                    setNewKeyword("");
                }
            };
            const handleRemoveKeyword = (kToRemove) => {
                setKeywords(keywords.filter(k => k !== kToRemove));
            };

            const handleKeyDown = (e, action) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    action();
                }
            };

            const handleSave = async () => {
                let finalSources = [...sources];
                if (newSource && !finalSources.includes(newSource)) {
                    finalSources.push(newSource);
                    setSources(finalSources);
                    setNewSource("");
                }

                let finalKeywords = [...keywords];
                if (newKeyword && !finalKeywords.includes(newKeyword)) {
                    finalKeywords.push(newKeyword);
                    setKeywords(finalKeywords);
                    setNewKeyword("");
                }

                setIsSaving(true);
                try {
                    await onSave({
                        sources: finalSources,
                        priority_sources: prioritySources,
                        keywords: finalKeywords,
                        time_window_hours: parseInt(timeWindow),
                        personality
                    });
                } finally {
                    setIsSaving(false);
                    onClose();
                }
            };

            const modalRef = React.useRef(null);
            React.useEffect(() => {
                if (!isOpen) return;
                const el = modalRef.current;
                if (!el) return;
                const focusables = el.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
                const first = focusables[0];
                const last = focusables[focusables.length - 1];
                if (first) first.focus();
                const onKey = (e) => {
                    if (e.key === 'Escape') { e.preventDefault(); onClose(); return; }
                    if (e.key !== 'Tab') return;
                    if (e.shiftKey) {
                        if (document.activeElement === first) { e.preventDefault(); last?.focus(); }
                    } else {
                        if (document.activeElement === last) { e.preventDefault(); first?.focus(); }
                    }
                };
                document.addEventListener('keydown', onKey);
                return () => document.removeEventListener('keydown', onKey);
            }, [isOpen, onClose]);

            return (
                <div ref={modalRef} role="dialog" aria-modal="true" aria-labelledby="settings-modal-title" className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
                    <div className="bg-white dark:bg-slate-900 border-2 border-slate-900 dark:border-slate-100 shadow-2xl w-full max-w-lg overflow-hidden transform transition-all flex flex-col max-h-[90vh]" onClick={(e) => e.stopPropagation()}>
                        <div className="px-6 py-4 border-b-2 border-slate-900 dark:border-slate-100 flex justify-between items-center bg-white dark:bg-slate-900 shrink-0">
                            <h3 id="settings-modal-title" className="font-display italic text-3xl text-slate-900 dark:text-white font-normal tracking-tight">Configuration</h3>
                            <button onClick={onClose} className="p-2.5 min-h-[44px] min-w-[44px] flex items-center justify-center text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500" aria-label="Close">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>

                        <div className="p-6 space-y-6 overflow-y-auto">
                            {/* Personality */}
                            <div>
                                <label htmlFor="anchor-personality" className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-2">
                                    <Icons.Mic /> Anchor Personality
                                </label>
                                <select 
                                    id="anchor-personality"
                                    value={personality} 
                                    onChange={(e) => setPersonality(e.target.value)}
                                    className="w-full bg-slate-50 dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-100 text-sm focus-visible:ring-amber-500 focus-visible:border-amber-500 block p-2.5"
                                >
                                    <option value="anchor">The Anchor (Professional)</option>
                                    <option value="analyst">The Analyst (Fast, Deep)</option>
                                    <option value="dj">The DJ (Casual, Fun)</option>
                                </select>
                            </div>

                            {/* Time Window */}
                            <div>
                                <label htmlFor="lookback-period" className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Lookback Period</label>
                                <select 
                                    id="lookback-period"
                                    value={timeWindow} 
                                    onChange={(e) => setTimeWindow(e.target.value)}
                                    className="w-full bg-slate-50 dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-100 text-sm focus-visible:ring-amber-500 focus-visible:border-amber-500 block p-2.5"
                                >
                                    <option value="12">Last 12 Hours</option>
                                    <option value="24">Last 24 Hours</option>
                                    <option value="72">Last 3 Days</option>
                                    <option value="168">Last 7 Days</option>
                                </select>
                            </div>

                            {/* Watchlist */}
                            <div>
                                <label htmlFor="watchlist-input" className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Watchlist (Keywords)</label>
                                <p id="watchlist-help" className="text-xs text-slate-500 mb-2">If added, ONLY emails containing these words will be shown.</p>
                                <div className="flex gap-2 mb-3">
                                    <input 
                                        id="watchlist-input"
                                        type="text" 
                                        aria-describedby="watchlist-help"
                                        value={newKeyword}
                                        onChange={(e) => setNewKeyword(e.target.value)}
                                        onKeyDown={(e) => handleKeyDown(e, handleAddKeyword)} 
                                        placeholder="e.g. Apple, Interest Rates"
                                        className="flex-1 bg-slate-50 dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-100 text-sm focus-visible:ring-amber-500 focus-visible:border-amber-500 block p-2.5"
                                    />
                                    <button onClick={handleAddKeyword} disabled={!newKeyword.trim()} title={!newKeyword.trim() ? "Enter a keyword to add" : ""} className="px-4 py-2 font-mono text-xs uppercase tracking-widest font-bold border-2 border-slate-900 dark:border-white text-slate-900 dark:text-white hover:bg-slate-900 hover:text-white dark:hover:bg-white dark:hover:text-slate-900 disabled:opacity-50 disabled:cursor-not-allowed transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500">Add</button>
                                </div>
                                {keywords.length > 0 && (
                                    <div className="flex flex-wrap gap-2 mb-2">
                                        {keywords.map(k => (
                                            <span key={k} className="px-2 py-1 bg-indigo-100 dark:bg-indigo-900/30 text-indigo-800 dark:text-indigo-200 rounded text-xs flex items-center gap-1">
                                                {k}
                                                <button aria-label={`Remove keyword ${k}`} onClick={() => handleRemoveKeyword(k)} className="hover:text-red-500 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500 rounded-sm ml-1"><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                            </span>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Sources */}
                            <div>
                                <label htmlFor="sources-input" className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Sources</label>
                                <div className="flex gap-2 mb-3">
                                    <input 
                                        id="sources-input"
                                        type="text" 
                                        value={newSource}
                                        onChange={(e) => setNewSource(e.target.value)}
                                        onKeyDown={(e) => handleKeyDown(e, handleAddSource)} 
                                        placeholder="e.g. bloomberg.com"
                                        className="flex-1 bg-slate-50 dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-100 text-sm focus-visible:ring-amber-500 focus-visible:border-amber-500 block p-2.5"
                                    />
                                    <button onClick={handleAddSource} disabled={!newSource.trim()} title={!newSource.trim() ? "Enter a source to add" : ""} className="px-4 py-2 font-mono text-xs uppercase tracking-widest font-bold border-2 border-slate-900 dark:border-white text-slate-900 dark:text-white hover:bg-slate-900 hover:text-white dark:hover:bg-white dark:hover:text-slate-900 disabled:opacity-50 disabled:cursor-not-allowed transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500">Add</button>
                                </div>
                                <div className="bg-slate-50 dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-700 p-2 max-h-40 overflow-y-auto">
                                    {sources.length === 0 ? (
                                        <p className="text-slate-400 text-sm p-2 text-center italic">No sources configured.</p>
                                    ) : (
                                        sources.map(source => {
                                            const isPriority = prioritySources.includes(source);
                                            return (
                                                <div key={source} className="flex justify-between items-center p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-800 group transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500">

                        .catch(() => {
                            if (prefetchId !== prefetchIdRef.current) return;
                            if (resolvePrefetch) resolvePrefetch({ success: false });
                        })
                        .finally(() => {
                            if (prefetchId === prefetchIdRef.current) setIsPreloadingAudio(false);
                        });
                } catch (e) {
                    setError(e.message);
                    ph('capture', 'briefing_generation_failed', { error: e.message });
                }
                finally { setIsFetching(false); }
            };

            const handleGenerateAudio = async () => {
                if (!analysis) return;
                setError(null);
                if (prefetchPromiseRef.current) {
                    setIsGeneratingAudio(true);
                    try {
                        const result = await prefetchPromiseRef.current;
                        prefetchPromiseRef.current = null;
                        if (result && result.success && result.audio_content) {
                            setAudioSrc(`data:audio/mp3;base64,${result.audio_content}`);
                            ph('capture', 'audio_played', { generation_time_ms: 0, personality: settings.personality || 'anchor' });
                            if (audioRef.current) {
                                audioRef.current.addEventListener('ended', () => {
                                    ph('capture', 'audio_completed', { personality: settings.personality || 'anchor' });
                                }, { once: true });
                            }
                            return;
                        }
                    } catch (e) { /* fall through to on-demand fetch */ }
                    setIsGeneratingAudio(false);
                }
                if (preloadedAudio) {
                    setAudioSrc(`data:audio/mp3;base64,${preloadedAudio}`);
                    ph('capture', 'audio_played', { generation_time_ms: 0, personality: settings.personality || 'anchor' });
                    if (audioRef.current) {
                        audioRef.current.addEventListener('ended', () => {
                            ph('capture', 'audio_completed', { personality: settings.personality || 'anchor' });
                        }, { once: true });
                    }
                    return;
                }
                setIsGeneratingAudio(true);
                const startTime = Date.now();
                try {
                    const audioUrl = isMockSession ? `${backendUrl}/api/mock/audio` : `${backendUrl}/api/generate_audio`;
                    const res = await fetch(audioUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...analysis, greeting: new Date().getHours() < 12 ? 'Good morning' : new Date().getHours() < 17 ? 'Good afternoon' : 'Good evening' }),
                        credentials: 'include'
                    });
                    if (res.status === 401) { window.location.href = '/login'; return; }
                    if (!res.ok) {
                        const errorData = await res.json().catch(() => ({}));
                        const errorMsg = errorData.error ||
                            (res.status === 401 ? "Please log in to generate audio." :
                             "Unable to generate audio. Please try again.");
                        throw new Error(errorMsg);
                    }
                    const data = await res.json();
                    // Web Speech API fallback (mock mode, no pre-generated MP3)
                    if (data.use_web_speech && data.script) {
                        if ('speechSynthesis' in window) {
                            window.speechSynthesis.cancel();
                            const utt = new SpeechSynthesisUtterance(data.script);
                            
                            const setAnchorVoice = () => {
                                const voices = window.speechSynthesis.getVoices();
                                // Try to find a premium male voice that closely matches "Anchor"
                                const preferredVoice = voices.find(v => 
                                    (v.lang.startsWith('en-US') || v.lang.startsWith('en-GB')) && 
                                    (v.name.includes('Google US English') || v.name.includes('Male') || v.name.includes('David') || v.name.includes('Arthur'))
                                );
                                if (preferredVoice) utt.voice = preferredVoice;
                                utt.rate = playbackRate;
                                utt.pitch = 0.9; // Slightly lower pitch for more anchor-like authority
                                utt.onend = () => setWebSpeechActive(false);
                                utt.onerror = () => setWebSpeechActive(false);
                                window.speechSynthesis.speak(utt);
                                setWebSpeechActive(true);
                            };

                            if (window.speechSynthesis.getVoices().length > 0) {
                                setAnchorVoice();
                            } else {
                                window.speechSynthesis.onvoiceschanged = setAnchorVoice;
                            }
                        }
                        setIsGeneratingAudio(false);
                        return;
                    }
                    setAudioSrc(`data:audio/mp3;base64,${data.audio_content}`);
                    const generationTime = Date.now() - startTime;
                    ph('capture', 'audio_played', {
                        generation_time_ms: generationTime,
                        personality: settings.personality || 'anchor'
                    });
                    if (audioRef.current) {
                        audioRef.current.addEventListener('ended', () => {
                            ph('capture', 'audio_completed', { personality: settings.personality || 'anchor' });
                        }, { once: true });
                    }
                } catch (e) {
                    setError(e.message);
                    ph('capture', 'audio_generation_failed', { error: e.message });
                }
                finally { setIsGeneratingAudio(false); }
            };

            const handleShare = async () => {
                if (!analysis) return;
                setIsSharing(true); setError(null);
                try {
                    const res = await fetch(`${backendUrl}/api/share`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(analysis),
                        credentials: 'include'
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const url = `${window.location.origin}/?share=${data.share_id}`;
                        navigator.clipboard.writeText(url);
                        setShareUrl(url);
                        setTimeout(() => setShareUrl(null), 3000);
                        ph('capture', 'share_clicked', { story_groups_count: analysis.story_groups?.length || 0 });
                    } else {
                        const errData = await res.json().catch(() => ({}));
                        setError(errData.error || 'Unable to share briefing. Please try again.');
                    }
                } catch (e) {
                    setError('Unable to share briefing. Please check your connection and try again.');
                }
                finally { setIsSharing(false); }
            };

            const generateFormattedSummary = () => {
                if (!analysis) return '';
                const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                
                let text = `═══════════════════════════════════════════════════════\n`;
                text += `MY ANCHOR - Daily AI News Briefing\n`;
                text += `${today} at ${time}\n`;
                text += `═══════════════════════════════════════════════════════\n\n`;
                
                // Top Stories
                if (analysis.story_groups && analysis.story_groups.length > 0) {
                    text += `📰 TOP STORIES\n`;
                    text += `${'─'.repeat(55)}\n\n`;
                    
                    analysis.story_groups.forEach((group, index) => {
                        text += `${index + 1}. ${group.group_headline.toUpperCase()}\n\n`;
                        text += `   ${group.consensus_summary || group.group_summary}\n\n`;
                        
                        if (group.stories && group.stories.length > 0) {
                            text += `   📊 Source Perspectives:\n`;
                            group.stories.forEach(story => {
                                const source = story.source.split('<')[0].trim().replace('.com', '');
                                text += `   • ${source}: ${story.angle}\n`;
                            });
                            text += `\n`;
                        }
                        
                        if (index < analysis.story_groups.length - 1) {
                            text += `${'─'.repeat(55)}\n\n`;
                        }
                    });
                }
                
                // In Brief Section
                if (analysis.remaining_stories && analysis.remaining_stories.length > 0) {
                    text += `\n📌 IN BRIEF\n`;
                    text += `${'─'.repeat(55)}\n\n`;
                    analysis.remaining_stories.forEach(story => {
                        text += `• ${story.headline}\n`;
                    });
                    text += `\n`;
                }
                
                // Footer
                text += `${'═'.repeat(55)}\n`;
                text += `Generated by My Anchor - Your AI News Analyst\n`;
                text += `https://myanchor.app\n`;
                text += `${'═'.repeat(55)}`;
                
                return text;
            };

            const handleCopySummary = () => {
                if (!analysis) return;
                const formattedText = generateFormattedSummary();
                    navigator.clipboard.writeText(formattedText).then(() => {
                        setCopySuccess(true);
                        setTimeout(() => setCopySuccess(false), 3000);
                        ph('capture', 'copy_summary_clicked', {
                            story_groups_count: analysis.story_groups?.length || 0,
                            remaining_stories_count: analysis.remaining_stories?.length || 0,
                            format: 'enhanced'
                        });
                    });
            };


            const escapeHtml = (unsafe) => {
                if (unsafe == null) return '';
                return unsafe
                     .toString()
                     .replace(/&/g, "&amp;")
                     .replace(/</g, "&lt;")
                     .replace(/>/g, "&gt;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#039;");
            };

            const generatePDFHtml = (analysis, today) => {
                let html = `
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>My Anchor Briefing - ${today}</title>
                        <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&display=swap" rel="stylesheet">
                        <style>
                            @media print {
                                @page { margin: 0.8in; }
                                .story-headline { page-break-after: avoid; }
                                .story-summary { page-break-before: avoid; }
                            }
                            * {
                                box-sizing: border-box;
                            }
                            body {
                                font-family: 'Geist', 'Inter', sans-serif;
                                line-height: 1.6;
                                color: #0f172a;
                                background-color: #f8fafc;
                                max-width: 800px;
                                margin: 0 auto;
                                padding: 40px 20px;
                                -webkit-font-smoothing: antialiased;
                            }
                            .header {
                                display: flex;
                                justify-content: space-between;
                                align-items: baseline;
                                border-bottom: 2px solid #0f172a;
                                padding-bottom: 20px;
                                margin-bottom: 40px;
                            }
                            .header h1 {
                                font-family: 'Instrument Serif', serif;
                                font-style: italic;
                                font-size: 48px;
                                font-weight: 400;
                                color: #0f172a;
                                margin: 0;
                                letter-spacing: -0.02em;
                            }
                            .date {
                                font-family: 'Geist Mono', monospace;
                                font-size: 12px;
                                font-weight: bold;
                                text-transform: uppercase;
                                letter-spacing: 0.1em;
                                color: #64748b;
                            }
                            .story {
                                margin-bottom: 60px;
                            }
                            .story-headline {
                                font-family: 'Instrument Serif', serif;
                                font-size: 36px;
                                font-weight: 400;
                                line-height: 1.1;
                                color: #0f172a;
                                margin: 0 0 20px 0;
                                letter-spacing: -0.02em;
                            }
                            .story-summary {
                                font-size: 18px;
                                color: #475569;
                                margin-bottom: 30px;
                                line-height: 1.7;
                            }
                            .perspectives {
                                display: flex;
                                flex-wrap: wrap;
                                gap: 1px;
                                background-color: #e2e8f0;
                                border: 1px solid #e2e8f0;
                                margin-bottom: 20px;
                            }
                            .perspective {
                                flex: 1 1 calc(50% - 1px);
                                background-color: #ffffff;
                                padding: 24px;
                                min-width: 300px;
                            }
                            .perspective .source {
                                display: block;
                                font-family: 'Geist Mono', monospace;
                                font-size: 12px;
                                font-weight: bold;
                                text-transform: uppercase;
                                letter-spacing: 0.1em;
                                color: #f59e0b;
                                margin-bottom: 12px;
                            }
                            .perspective .angle {
                                font-size: 16px;
                                color: #1e293b;
                                margin: 0;
                                line-height: 1.6;
                            }
                            .sources-list {
                                font-family: 'Geist Mono', monospace;
                                font-size: 12px;
                                text-transform: uppercase;
                                letter-spacing: 0.1em;
                                color: #94a3b8;
                                border-top: 1px solid #e2e8f0;
                                padding-top: 16px;
                                margin-top: 24px;
                            }
                            .in-brief-section {
                                margin-top: 60px;
                            }
                            .in-brief-title {
                                font-family: 'Instrument Serif', serif;
                                font-size: 32px;
                                font-weight: 400;
                                color: #0f172a;
                                border-bottom: 2px solid #0f172a;
                                padding-bottom: 12px;
                                margin-bottom: 24px;
                            }
                            .brief-items {
                                display: grid;
                                grid-template-columns: 1fr 1fr;
                                gap: 20px 40px;
                            }
                            .brief-item {
                                display: flex;
                                align-items: flex-start;
                                gap: 12px;
                            }
                            .brief-item .bullet {
                                width: 6px;
                                height: 6px;
                                background-color: #0f172a;
                                border-radius: 50%;
                                margin-top: 10px;
                                flex-shrink: 0;
                            }
                            .brief-item .text {
                                font-size: 16px;
                                color: #1e293b;
                                line-height: 1.5;
                            }
                            .footer {
                                text-align: center;
                                margin-top: 80px;
                                padding-top: 40px;
                                border-top: 1px solid #e2e8f0;
                                font-family: 'Geist Mono', monospace;
                                font-size: 12px;
                                text-transform: uppercase;
                                letter-spacing: 0.1em;
                                color: #94a3b8;
                            }
                            .footer .logo {
                                font-weight: bold;
                                color: #0f172a;
                                margin-bottom: 8px;
                            }
                        </style>
                    </head>
                    <body>
                        <div class="header">
                            <h1>My Anchor</h1>
                            <div class="date">${today}</div>
                        </div>
                `;
                
                // Top Stories
                if (analysis.story_groups && analysis.story_groups.length > 0) {
                    analysis.story_groups.forEach((group, index) => {
                        html += `
                            <div class="story">
                                <h2 class="story-headline">${escapeHtml(group.group_headline)}</h2>
                                <div class="story-summary">${escapeHtml(group.consensus_summary || group.group_summary)}</div>
                        `;
                        
                        if (group.stories && group.stories.length > 0) {
                            html += '<div class="perspectives">';
                            group.stories.forEach(story => {
                                const source = story.source.split('<')[0].trim().replace(/\.(com|co\.\w+)$/, '') || story.source;
                                html += `
                                    <div class="perspective">
                                        <span class="source">${escapeHtml(source)}</span>
                                        <p class="angle">${escapeHtml(story.angle)}</p>
                                    </div>
                                `;
                            });
                            html += '</div>';
                            
                            const sourcesList = group.stories.map(s => s.source.split('<')[0].trim().replace(/\.(com|co\.\w+)$/, '')).join(', ');
                            html += `<div class="sources-list">Verified Sources: ${escapeHtml(sourcesList)}</div>`;
                        }
                        
                        html += '</div>';
                    });
                }
                
                // In Brief
                if (analysis.remaining_stories && analysis.remaining_stories.length > 0) {
                    html += '<div class="in-brief-section">';
                    html += '<h3 class="in-brief-title">In Brief</h3>';
                    html += '<div class="brief-items">';
                    analysis.remaining_stories.forEach(story => {
                        html += `
                            <div class="brief-item">
                                <div class="bullet"></div>
                                <div class="text">${escapeHtml(story.headline)}</div>
                            </div>
                        `;
                    });
                    html += '</div></div>';
                }
                
                // Footer
                html += `
                        <div class="footer">
                            <div class="logo">MY ANCHOR</div>
                            <div>Generated on ${new Date().toLocaleString('en-US')}</div>
                            <div>https://myanchor.app</div>
                        </div>
                    </body>
                    </html>
                `;

                return html;
            };

            const handleDownloadPDF = () => {
                if (!analysis) return;

                // Create a printable HTML version
                const printWindow = window.open('', '_blank');
                const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

                printWindow.document.write(generatePDFHtml(analysis, today));
                
                printWindow.document.close();
                
                // Trigger print dialog after short delay
                setTimeout(() => {
                    printWindow.print();
                }, 250);
                
                ph('capture', 'pdf_downloaded', {
                    story_groups_count: analysis.story_groups?.length || 0,
                    remaining_stories_count: analysis.remaining_stories?.length || 0
                });
            };

            const togglePlayPause = () => {
                if (webSpeechActive && window.speechSynthesis) {
                    if (window.speechSynthesis.paused) {
                        window.speechSynthesis.resume();
                        setIsPlaying(true);
                    } else if (window.speechSynthesis.speaking) {
                        window.speechSynthesis.pause();
                        setIsPlaying(false);
                    }
                } else if (audioRef.current) {
                    if (audioRef.current.paused) {
                        audioRef.current.play();
                    } else {
                        audioRef.current.pause();
                    }
                }
            };

            const formatTime = (timeInSeconds) => {
                if (isNaN(timeInSeconds) || timeInSeconds < 0) return "00:00";
                const m = Math.floor(timeInSeconds / 60).toString().padStart(2, '0');
                const s = Math.floor(timeInSeconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const handleSeek = (e) => {
                if (audioRef.current && audioDuration) {
                    const rect = e.currentTarget.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const percent = Math.max(0, Math.min(1, x / rect.width));
                    audioRef.current.currentTime = percent * audioDuration;
                    setAudioProgress(percent * audioDuration);
                }
            };

            const handleToggleSpeed = () => {
                const speeds = [1.0, 1.25, 1.5, 2.0];
                const currentIndex = speeds.indexOf(playbackRate);
                const nextSpeed = speeds[(currentIndex + 1) % speeds.length];
                setPlaybackRate(nextSpeed);
            };

            // Keyboard shortcuts (R=Refresh, P=Play, S=Settings) — not when modal, tour, or typing in fields
            React.useEffect(() => {
                if (sharedData) return;
                const onKey = (e) => {
                    if (isSettingsOpen || showTour) return;
                    const tag = (document.activeElement && document.activeElement.tagName) || '';
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(tag)) return;
                    const k = e.key?.toLowerCase();
                    if (e.key === ' ' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                        if (webSpeechActive || document.querySelector('audio')) {
                            e.preventDefault();
                            togglePlayPause();
                        }
                    }
                    else if (k === 'r' && !e.ctrlKey && !e.metaKey && !e.altKey) { e.preventDefault(); handleFetchAndAnalyze(); }
                    else if (k === 'p' && !e.ctrlKey && !e.metaKey && !e.altKey) { e.preventDefault(); if (analysis) handleGenerateAudio(); }
                    else if (k === 's' && !e.ctrlKey && !e.metaKey && !e.altKey) { e.preventDefault(); setIsSettingsOpen(true); }
                };
                document.addEventListener('keydown', onKey);
                return () => document.removeEventListener('keydown', onKey);
            }, [sharedData, isSettingsOpen, showTour, analysis, webSpeechActive]);

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-slate-900 pb-40 sm:pb-32">
                    <a href="#main-content" className="absolute left-4 top-4 z-50 -translate-y-[200%] focus:translate-y-0 px-4 py-2 bg-slate-900 text-white font-medium rounded-lg shadow-lg focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-amber-500 transition-transform">
                        Skip to main content
                    </a>
                    <header className="max-w-[1200px] mx-auto px-4 sm:px-6 pt-16 mb-16 border-b-2 border-slate-900 dark:border-slate-100 pb-8 flex flex-col sm:flex-row sm:items-baseline justify-between gap-4">
                        <h1 className="font-display italic text-5xl sm:text-6xl text-slate-900 dark:text-white font-normal m-0 tracking-tight">
                            {sharedData ? "Shared Briefing" : "My Anchor"}
                        </h1>
                        <div className="flex items-center justify-between sm:justify-end w-full sm:w-auto gap-6">
                            <span className="font-mono text-xs text-slate-500 dark:text-slate-400 uppercase tracking-widest font-bold">
                                {new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}
                            </span>
                            <div className="flex items-center gap-2">
                                <button onClick={() => setDarkMode(!darkMode)} className="p-2 text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500" title="Toggle dark mode" aria-label="Toggle dark mode">
                                    {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                                </button>
                                {!sharedData && (
                                    <>
                                        <button onClick={() => setIsSettingsOpen(true)} className="p-2 flex items-center gap-1 text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500" title="Settings (S)" aria-label="Open settings">
                                            <Icons.Settings />
                                        </button>
                                        <div className="h-4 w-px bg-slate-300 dark:bg-slate-700 mx-1"></div>
                                        <a href={`${backendUrl}/logout`} className="font-mono text-xs font-bold text-slate-500 hover:text-slate-900 dark:hover:text-white uppercase tracking-widest transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500">Logout</a>
                                    </>
                                )}
                            </div>
                        </div>
                    </header>
                    
                    {!sharedData && isSettingsOpen && (
                        <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} currentSettings={settings} onSave={handleSaveSettings} />
                    )}
                    {showTour && !sharedData && (
                        <OnboardingTour onClose={() => setShowTour(false)} />
                    )}

                    <main id="main-content" tabIndex="-1" className="px-4 sm:px-6 max-w-[1200px] mx-auto focus:outline-none">
                        {isMockSession && <DemoBanner />}
                        {!sharedData && (
                            <div className="flex flex-col sm:flex-row items-center justify-between gap-4 mb-8 border-b border-slate-200 dark:border-slate-800 pb-8">
                                <div className="text-center sm:text-left">
                                    <h2 className="text-lg font-mono font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1">
                                        {(() => {
                                            const h = new Date().getHours();
                                            const g = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
                                            const name = userInfo?.given_name || userInfo?.name?.split(' ')[0];
                                            return name ? `${g}, ${name}` : g;
                                        })()}
                                    </h2>
                                    {analysis && isPreloadingAudio && (
                                        <p role="status" aria-live="polite" className="text-amber-500 text-xs font-mono uppercase tracking-widest font-bold mt-2">Preparing audio...</p>
                                    )}
                                </div>
                                <div className="flex flex-wrap gap-4 justify-center sm:justify-end items-center">
                                    {analysis && (
                                        <button onClick={handleCopySummary} className="p-2 text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white transition-colors relative focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500" title="Copy Executive Summary" aria-label="Copy Executive Summary">
                                            {copySuccess ? <Icons.Check /> : <Icons.Copy />}
                                            {copySuccess && <span className="absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-mono text-xs py-1 px-2 rounded opacity-100 uppercase tracking-wider">Copied</span>}
                                        </button>
                                    )}
                                    {analysis && (
                                        <button onClick={handleDownloadPDF} className="p-2 text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500" title="Download as PDF" aria-label="Download as PDF">
                                            <Icons.Download />
                                        </button>
                                    )}
                                    {analysis && (
                                        <button onClick={handleShare} disabled={isSharing} className="p-2 text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500" title={isSharing ? "Sharing..." : "Share Briefing Link"} aria-label={isSharing ? "Sharing..." : "Share Briefing Link"}>
                                            {isSharing ? <span className="inline-block animate-spin"><Icons.Refresh /></span> : shareUrl ? <Icons.Check /> : <Icons.Share />}
                                        </button>
                                    )}
                                    <button onClick={handleFetchAndAnalyze} disabled={isFetching || isGeneratingAudio} className="font-mono text-xs uppercase tracking-widest font-bold flex items-center gap-2 px-4 py-2 border-2 border-slate-900 dark:border-white text-slate-900 dark:text-white hover:bg-slate-900 hover:text-white dark:hover:bg-white dark:hover:text-slate-900 disabled:opacity-50 disabled:cursor-not-allowed transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500" title="Refresh briefing (R)">
                                        {isFetching ? <span className="inline-block animate-spin"><Icons.Refresh /></span> : <Icons.Refresh />}
                                        {isFetching ? 'Scanning' : 'Refresh'}
                                    </button>
                                    {analysis && (
                                        <button onClick={handleGenerateAudio} disabled={isGeneratingAudio || isFetching} className="font-mono text-xs uppercase tracking-widest font-bold flex items-center gap-2 px-4 py-2 bg-amber-500 text-white hover:bg-amber-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500" title="Play briefing audio (P)">
                                            {(isPreloadingAudio || isGeneratingAudio) ? <span className="inline-block animate-spin"><Icons.Refresh /></span> : <Icons.Play />}
                                            {isPreloadingAudio ? 'Preparing' : isGeneratingAudio ? 'Synthesizing' : 'Play Audio'}
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}

                        {error && (
                            <div role="alert" aria-live="assertive" className="mb-12 p-6 border-l-4 border-rose-500 bg-rose-50 dark:bg-rose-950/20 text-slate-900 dark:text-slate-100 flex flex-wrap items-center justify-between gap-4 font-body">
                                <p className="flex-1 min-w-0 text-lg">{error}</p>
                                <div className="flex items-center gap-3 shrink-0">
                                    <button onClick={() => { setError(null); handleFetchAndAnalyze(); }} className="font-mono text-xs uppercase tracking-widest font-bold px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white transition-colors" aria-label="Retry">Retry</button>
                                </div>
                            </div>
                        )}

                        {isFetching ? (
                            <BriefingSkeleton stage={fetchStage} />
                        ) : analysis ? (
                            <div className="space-y-24">
                                <div>
                                    {analysis.story_groups && analysis.story_groups.map((group, index) => (
                                        <StoryGroup key={index} group={group} index={index} />
                                    ))}
                                </div>
                                
                                <InBriefSection remaining_stories={analysis.remaining_stories} storyGroupsLength={analysis.story_groups?.length || 0} />
                            </div>
                        ) : (
                            <div className="text-center py-16 max-w-md mx-auto">
                                <p className="font-display italic text-3xl text-slate-500 dark:text-slate-400 mb-8">Ready to fetch your daily briefing.</p>
                                <button onClick={handleFetchAndAnalyze} disabled={isFetching} className="font-mono text-xs uppercase tracking-widest font-bold flex items-center justify-center gap-3 px-8 py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 w-full hover:bg-slate-800 dark:hover:bg-slate-200 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500">
                                    {isFetching ? <span className="inline-block animate-spin"><Icons.Refresh /></span> : <Icons.Refresh />}
                                    {isFetching ? 'Scanning...' : 'Get my briefing'}
                                </button>
                            </div>
                        )}
                    </main>

                    {shareUrl && !sharedData && (
                        <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-50 px-4 py-2 bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 rounded-lg shadow-lg text-sm font-medium flex items-center gap-2" role="status" aria-live="polite">
                            <Icons.Check />
                            Link copied to clipboard!
                        </div>
                    )}
                    {(audioSrc || webSpeechActive) && !sharedData && (
                        <div id="audio-player-bar" role="region" aria-label="Audio Player" className="fixed bottom-0 left-0 right-0 bg-slate-900 dark:bg-slate-950 p-4 sm:p-6 shadow-[0_-10px_40px_rgba(0,0,0,0.2)] z-50 animate-[slideUp_0.3s_ease-out]">
                            <div className="max-w-[1200px] mx-auto flex flex-col sm:flex-row sm:items-center gap-4 sm:gap-6">
                                <div className="flex items-center gap-4">
                                    <button onClick={togglePlayPause} className="w-14 h-14 bg-amber-500 text-white rounded-full flex items-center justify-center shrink-0 hover:scale-105 active:scale-95 transition-transform focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-amber-500 shadow-md" title={isPlaying ? "Pause" : "Play"} aria-label={isPlaying ? "Pause" : "Play"}>
                                        {isPlaying ? <Icons.Pause /> : <Icons.Play />}
                                    </button>
                                    {webSpeechActive && (
                                        <div className="font-mono text-xs text-amber-500 uppercase tracking-widest shrink-0 font-bold sm:hidden">
                                            Live Synthesis
                                        </div>
                                    )}
                                </div>
                                <div className="flex-1 min-w-0 flex flex-col justify-center gap-2">
                                    {audioSrc ? (
                                        <div className="flex items-center gap-4 w-full">
                                            <span className="font-mono text-xs text-slate-400 w-10 text-right shrink-0">{formatTime(audioProgress)}</span>
                                            <div className="flex-1 h-3 bg-slate-700 rounded-full cursor-pointer relative overflow-hidden group" onClick={handleSeek} role="slider" aria-label="Audio progress" aria-valuemin="0" aria-valuemax={audioDuration} aria-valuenow={audioProgress} tabIndex="0">
                                                <div className="absolute top-0 left-0 bottom-0 bg-amber-500 group-hover:bg-amber-400 transition-colors" style={{ width: `${audioDuration > 0 ? (audioProgress / audioDuration) * 100 : 0}%` }}></div>
                                            </div>
                                            <span className="font-mono text-xs text-slate-400 w-10 shrink-0">{formatTime(audioDuration)}</span>
                                        </div>
                                    ) : (
                                        <div className="flex items-center gap-4 w-full h-3">
                                            <div className="waveform flex-1 opacity-80 animate-pulse"></div>
                                        </div>
                                    )}
                                    <div className="flex-1 min-w-0 absolute opacity-0 pointer-events-none">
                                        {audioSrc && (
                                            <audio 
                                                ref={audioRef} 
                                                autoPlay 
                                                src={audioSrc} 
                                                onTimeUpdate={(e) => setAudioProgress(e.target.currentTime)} 
                                                onLoadedMetadata={(e) => setAudioDuration(e.target.duration)} 
                                                onPlay={() => setIsPlaying(true)} 
                                                onPause={() => setIsPlaying(false)} 
                                                onEnded={() => setIsPlaying(false)} 
                                                onError={(e) => {
                                                    console.error("Audio element error:", e.target.error);
                                                    setError(`Audio playback error: ${e.target.error?.message || "Source blocked or invalid format"}`);
                                                    setIsPlaying(false);
                                                }}
                                                className="w-full" 
                                            />
                                        )}
                                    </div>
                                </div>
                                <div className="flex items-center justify-end gap-2 shrink-0">
                                    <button onClick={handleToggleSpeed} className="h-10 px-3 font-mono text-xs font-bold text-slate-300 hover:text-white bg-white/5 hover:bg-white/10 rounded-full transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500" title="Playback speed" aria-label={`Playback speed: ${playbackRate}x`}>
                                        {playbackRate}x
                                    </button>
                                    {audioSrc && (
                                        <a href={audioSrc} download={`MyAnchor_Briefing_${new Date().toISOString().split('T')[0]}.mp3`} className="h-10 w-10 flex items-center justify-center text-slate-300 hover:text-white rounded-full hover:bg-white/10 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500" title="Download Audio" aria-label="Download Audio">
                                            <Icons.Download />
                                        </a>
                                    )}
                                    <div className="w-px h-6 bg-slate-700 mx-1"></div>
                                    <button onClick={() => { setAudioSrc(null); setWebSpeechActive(false); if ('speechSynthesis' in window) window.speechSynthesis.cancel(); setIsPlaying(false); }} className="h-10 w-10 flex items-center justify-center text-slate-400 hover:text-white rounded-full hover:bg-white/10 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500 shrink-0" aria-label="Close audio player" title="Close">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Error Boundary Component
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error('React Error Boundary caught error:', error, errorInfo);
                // Send to Sentry if available
                if (window.Sentry) {
                    Sentry.captureException(error, {
                        contexts: { react: { componentStack: errorInfo.componentStack } }
                    });
                }
                ph('capture', 'react_error', {
                    error: error.toString(),
                    componentStack: errorInfo.componentStack
                });
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900 p-4">
                            <div className="max-w-md w-full bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700 p-8 text-center">
                                <div className="w-16 h-16 bg-red-100 dark:bg-red-900/30 rounded-full mx-auto flex items-center justify-center mb-4">
                                    <Icons.Alert />
                                </div>
                                <h2 className="text-2xl font-serif font-bold text-slate-900 dark:text-white mb-2">Something went wrong</h2>
                                <p className="text-slate-500 dark:text-slate-400 mb-6">We've been notified and are looking into it.</p>
                                <button 
                                    onClick={() => window.location.reload()} 
                                    className="px-6 py-3 bg-slate-900 text-white rounded-lg hover:bg-slate-800 transition-colors font-medium focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500"
                                >
                                    Reload Page
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // Main App Component
        const App = () => {
            const [isLoading, setIsLoading] = React.useState(true);
            const [isLoggedIn, setIsLoggedIn] = React.useState(false);
            const [isMockSession, setIsMockSession] = React.useState(false);
            const [userInfo, setUserInfo] = React.useState(null);
            const [sharedData, setSharedData] = React.useState(null);

            React.useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const shareId = urlParams.get('share');
                
                if (shareId) {
                    fetch(`${backendUrl}/api/shared/${shareId}`)
                        .then(res => res.json())
                        .then(data => { setSharedData(data); setIsLoading(false); })
                        .catch(() => setIsLoading(false));
                } else {
                    fetch(`${backendUrl}/api/check_auth`, { credentials: 'include' })
                        .then(res => res.json())
                        .then(data => {
                            if (data.logged_in) {
                                setIsLoggedIn(true);
                                setUserInfo(data.user);
                                setIsMockSession(!!data.is_mock_session);
                            }
                            setIsLoading(false);
                        })
                        .catch(() => setIsLoading(false));
                }
            }, []);

            if (isLoading) return <LoadingState text="Loading..." />;

            const mainContent = sharedData ? (
                <Dashboard userInfo={null} sharedData={sharedData} isMockSession={false} />
            ) : new URLSearchParams(window.location.search).get('logout') === 'true' ? (
                <LogoutPage />
            ) : !isLoggedIn ? (
                <LoginPage />
            ) : (
                <Dashboard userInfo={userInfo} sharedData={null} isMockSession={isMockSession} />
            );

            return <div className="animate-[fadeIn_0.45s_ease-out]">{mainContent}</div>;
        };

        const container = document.getElementById('root');
        if (container) { 
            const root = ReactDOM.createRoot(container); 
            root.render(
                <ErrorBoundary>
                    <App />
                </ErrorBoundary>
            );
        }
    /* {% endraw %} */
    </script>
</body>
</html>
